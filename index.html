        function initMenu() {
            const container = document.getElementById('accordion-container');
            container.innerHTML = '';
            menuData.forEach((catGroup) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'accordion-item'; 
                const header = document.createElement('div');
                header.className = 'accordion-header';
                header.innerText = catGroup.category;
                header.onclick = () => { itemDiv.classList.toggle('active'); };
                const content = document.createElement('div');
                content.className = 'accordion-content';
                const grid = document.createElement('div');
                grid.className = 'menu-grid';
                catGroup.items.forEach(item => { grid.innerHTML += renderMenuItemHtml(item, catGroup); });
                content.appendChild(grid);
                itemDiv.appendChild(header);
                itemDiv.appendChild(content);
                container.appendChild(itemDiv);
            });
        }

        function renderMenuItemHtml(item, catGroup) {
            let html = `<div class="menu-item"><div><div class="item-name">${item.name}</div>`;
            
            // 1. 主食系列 (吐司/漢堡/潛艇堡)

                html += `<div class="opt-label">選擇主食種類：</div><div class="option-group" id="type-${item.id}">`;

                html += `</div>`;
                if (item.hasEggOpt) {
                    html += `<div class="opt-label">加蛋/無蛋選單：</div><div class="option-group" id="egg-${item.id}">
                        <button class="opt-btn selected" onclick="updateMainPrice('${item.id}', this)">加蛋</button>
                        <button class="opt-btn" onclick="updateMainPrice('${item.id}', this)">無蛋</button>
                    </div>`;
                } else {
                    html += `<div class="opt-label">固定配方：</div><div class="option-group" id="egg-${item.id}">
                        <button class="opt-btn selected" style="cursor:default" onclick="return false;">無蛋</button>
                    </div>`;

                // 🛠️ 需求 2：新增主食系列客製化備註輸入框
                html += `<div class="opt-label">餐點客製化備註：</div>

                let firstKey = item.hasEggOpt ? `${item.types[0]}_加蛋` : `${item.types[0]}_無蛋`;
                let initPrice = item.prices[firstKey] || 30;
                html += `</div><div class="item-footer"><span class="item-price" id="price-${item.id}">$${initPrice}</span>`;

            // 2. 蛋餅與抓餅系列

                html += `<div id="combo-block-${item.id}" class="combo-container" style="display: none;">

                                <option value="豆漿">豆漿</option>

                                    <select id="combo-sugar-${item.id}" class="opt-select">

                                        <option value="半糖">半糖</option>
                                        <option value="無糖">無糖</option>
                                    </select>
                                </div>
                            </div>
                         </div>`;

                let initPrice = Object.values(item.prices)[0];
                html += `</div><div class="item-footer"><span class="item-price" id="price-${item.id}">$${initPrice}</span>`;
            } 
            
            // 5. 果醬吐司或其他有一階規格的系列
            else if (item.prices && !item.tempOptions) {
                html += `<div class="opt-label">選擇規格：</div><div class="option-group" id="spec-${item.id}">`;
                Object.keys(item.prices).forEach((spec, idx) => { html += `<button class="opt-btn ${idx===0?'selected':''}" onclick="updateSpecPrice('${item.id}', ${item.prices[spec]}, this)">${spec}</button>`; });
                html += `</div>`;
                let initPrice = Object.values(item.prices)[0];
                html += `</div><div class="item-footer"><span class="item-price" id="price-${item.id}">$${initPrice}</span>`;

        function selectSingleBtn(btn) {
            const p = btn.parentElement;
            p.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        // 彈性切換蛋餅/抓餅選單顯示
        function toggleEggCakeType(id, price, clickedBtn) {
            selectSingleBtn(clickedBtn);
            document.getElementById(`price-${id}`).innerText = `$${price}`;
            const eggContainer = document.getElementById(`egg-opt-container-${id}`);
            if (clickedBtn.innerText === '抓餅') {
                eggContainer.style.display = 'block';
            } else {
                eggContainer.style.display = 'none';
            }
        }

        // 彈性切換麵食套餐客製面板顯示
        function toggleNoodleType(id, price, clickedBtn) {
            selectSingleBtn(clickedBtn);
            document.getElementById(`price-${id}`).innerText = `$${price}`;
            const comboBlock = document.getElementById(`combo-block-${id}`);
            if (clickedBtn.innerText === '升級套餐') {
                comboBlock.style.display = 'block';
            } else {
                comboBlock.style.display = 'none';
            }
        }

        function updateMainPrice(id, clickedBtn) {
            if(clickedBtn) { selectSingleBtn(clickedBtn); }
            let item = findItemById(id);
            const typeSelected = document.getElementById(`type-${id}`).querySelector('.opt-btn.selected').innerText;
            const eggSelected = document.getElementById(`egg-${id}`).querySelector('.opt-btn.selected').innerText;
            let key = `${typeSelected}_${eggSelected}`;
            let price = item.prices[key] || 0;
            document.getElementById(`price-${id}`).innerText = `$${price}`;
        }
        
        function updateSpecPrice(id, price, clickedBtn) {
            if(clickedBtn) { selectSingleBtn(clickedBtn); }
            document.getElementById(`price-${id}`).innerText = `$${price}`;
        }

        function updateDrinkPrice(id, clickedBtn) {
            if(clickedBtn) { selectSingleBtn(clickedBtn); }
            let item = findItemById(id);
            const sizeSelected = document.getElementById(`size-${id}`).querySelector('.opt-btn.selected').innerText;
            let price = item.prices[sizeSelected];
            document.getElementById(`price-${id}`).innerText = `$${price}`;
        }

        function findItemById(id) {
            for(let cat of menuData) {
                let match = cat.items.find(i => i.id === id);
                if(match) return match;
            }
            return null;
        }

        // 修改後的購物車打包器：將各種新下拉選單與備註完美收納進 fullName
        function addToCart(id, name) {
            let item = findItemById(id);
            let fullName = name;
            let finalPrice = 0;

            // 抓出所屬的大分類物件來交叉判斷
            let catGroup = menuData.find(cat => cat.items.some(i => i.id === id));

            // A. 主食系列
            if (catGroup.isMainItem) {
                const typeS = document.getElementById(`type-${id}`).querySelector('.opt-btn.selected').innerText;
                const eggS = document.getElementById(`egg-${id}`).querySelector('.opt-btn.selected').innerText;
                const customNote = document.getElementById(`note-${id}`).value.trim();
                
                fullName = `${typeS}-${name}(${eggS})`;
                if (customNote) {
                    fullName += ` [備註: ${customNote}]`;
                }
                finalPrice = item.prices[`${typeS}_${eggS}`];
            } 
            // B. 蛋餅/抓餅系列
            else if (catGroup.isEggCakeSection) {
                const specS = document.getElementById(`spec-${id}`).querySelector('.opt-btn.selected').innerText;
                if (specS === '抓餅') {
                    const eggS = document.getElementById(`egg-select-${id}`).value;
                    fullName = `${name}${specS}(${eggS})`;
                } else {
                    fullName = `${name}${specS}`;
                }
                finalPrice = item.prices[specS];
            } 
            // C. 特調飲品系列
            else if (catGroup.isDrinkSection && item.prices) {
                const sizeS = document.getElementById(`size-${id}`).querySelector('.opt-btn.selected').innerText;
                const tempS = document.getElementById(`temp-select-${id}`).value;
                const sugarS = document.getElementById(`sugar-select-${id}`).value;
                
                fullName = `${name}-${sizeS}(${tempS}/${sugarS})`;
                finalPrice = item.prices[sizeS];
            } 
            // D. 鐵板麵食系列
            else if (catGroup.isNoodleSection) {
                const specS = document.getElementById(`spec-${id}`).querySelector('.opt-btn.selected').innerText;
                if (specS === '升級套餐') {
                    const snack = document.getElementById(`combo-snack-${id}`).value;
                    const topping = document.getElementById(`combo-topping-${id}`).value;
                    const drink = document.getElementById(`combo-drink-${id}`).value;
                    const temp = document.getElementById(`combo-temp-${id}`).value;
                    const sugar = document.getElementById(`combo-sugar-${id}`).value;
                    
                    fullName = `${name}(升級套餐: ${snack}+${topping}+${drink}[${temp}/${sugar}])`;
                } else {
                    fullName = `${name}(${specS})`;
                }
                finalPrice = item.prices[specS];
            } 
            // E. 其他單點或果醬系列
            else if (item.prices) {
                const specS = document.getElementById(`spec-${id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${name}(${specS})`;
                finalPrice = item.prices[specS];
            } else {
                finalPrice = item.price;
                if (item.isEggFryItem) {
                    fullName = document.getElementById(`egg-fry-select-${id}`).value;
                } else if(item.typeOptions) {
                    const custS = document.getElementById(`custom-${id}`).querySelector('.opt-btn.selected').innerText;
                    fullName = `${name}(${custS})`;
                }
            }

            const existing = cart.find(c => c.fullName === fullName);
            if (existing) { existing.qty++; } else { cart.push({ fullName: fullName, price: finalPrice, qty: 1 }); }
            
            // 加入後自動清空主食備註欄，方便下一次點餐
            if (catGroup.isMainItem) {
                document.getElementById(`note-${id}`).value = '';
            }
            
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const totalSpan = document.getElementById('cart-total-price');
            if(cart.length === 0) {
                list.innerHTML = `<p style="color: #a0aec0; text-align: center; padding: 20px 0;">購物車目前空空如也</p>`;
                totalSpan.innerText = '0';
                return;
            }
            let cartHtml = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += (item.price * item.qty);
                cartHtml += `<div class="cart-item">
                    <span style="font-weight:500;">${item.fullName} <b>x ${item.qty}</b></span>
                    <span>$${item.price * item.qty} <button style="color:#e53e3e; border:none; background:none; cursor:pointer; margin-left:8px; font-size:14px;" onclick="removeFromCart(${index})">❌</button></span>
                </div>`;
            });
            list.innerHTML = cartHtml;
            totalSpan.innerText = total;
        }

        function removeFromCart(index) { cart.splice(index, 1); renderCart(); }

        function submitOrder() {
            if(cart.length === 0) { alert('您的購物車是空的！'); return; }
            const phone = document.getElementById('user-phone').value.trim();
            if(!phone) { alert('為了點餐狀態通知，請務必填寫聯絡電話！'); return; }

            const oDate = document.getElementById('order-date').value;
            const dtype = document.getElementById('dining-type').value;
            const tnum = document.getElementById('table-num').value || '未填寫';
            const note = document.getElementById('order-note').value || '無';
            const total = parseInt(document.getElementById('cart-total-price').innerText);
            
            let currentId = parseInt(localStorage.getItem('jlh_order_id_counter')) || 1001;
            const itemsString = cart.map(c => `${c.fullName} x${c.qty}`).join(', ');

            const newOrder = {
                id: currentId,
                date: oDate,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                type: `${dtype} (${tnum})`,
                phone: phone,
                line: document.getElementById('user-line').value.trim() || '未填寫',
                items: itemsString, 
                note: note,
                total: total,
                status: '新訂單',
                timestamp: firebase.database.ServerValue.TIMESTAMP 
            };

            database.ref('orders').push(newOrder)
            .then(() => {
                alert(`🎉 訂單 #${currentId} 已成功傳送到雲端資料庫！`);
                localStorage.setItem('jlh_order_id_counter', currentId + 1);
                cart = [];
                document.getElementById('user-phone').value = '';
                document.getElementById('user-line').value = '';
                document.getElementById('order-note').value = '';
                renderCart();
            })
            .catch((error) => {
                console.error("Firebase Database 寫入失敗:", error);
                alert("❌ 訂單傳送失敗！");
            });
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function scrollToCart() {
            document.getElementById('target-cart-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('order-date').value = today;
            initMenu();
        };
    </script>
</body>
</html>
