        .accordion-content { display: none; padding: 20px; background: #fff; }
        .accordion-item.active .accordion-content { display: block; }
        
        /* 商品卡片排版 */

                    { id: "j_04", name: "椰香", prices: { "薄片": 20, "厚片": 25 } },
                    { id: "j_05", name: "抹茶", prices: { "薄片": 20, "厚片": 25 } }
                ]
            },
            {
                category: "🥤 飲品與慢湯",
                items: [
                    { id: "d_01", name: "紅茶", tempOptions: ["冰","涼","溫","熱"], prices: { "小400cc": 15, "中500cc": 20, "大700cc": 30 } },
                    { id: "d_02", name: "奶茶", tempOptions: ["冰","涼","溫","熱"], prices: { "小400cc": 15, "中500cc": 20, "大700cc": 30 } },
                    { id: "d_03", name: "鮮奶茶", tempOptions: ["冰","涼","溫","熱"], prices: { "小400cc": 25, "中500cc": 30, "大700cc": 40 } },
                    { id: "d_04", name: "豆漿", tempOptions: ["半糖","無糖"], prices: { "小400cc": 15, "中500cc": 20, "大700cc": 30 } },
                    { id: "d_05", name: "柳丁汁", tempOptions: ["冰","涼"], prices: { "小400cc": 20, "中500cc": 25, "大700cc": 35 } },
                    { id: "d_06", name: "豆漿紅茶", tempOptions: ["半糖","無糖"], prices: { "小400cc": 20, "中500cc": 25, "大700cc": 35 } },
                    { id: "d_07", name: "鴛鴦奶茶", tempOptions: ["冰","涼","溫","熱"], prices: { "小400cc": 20, "中500cc": 30, "大700cc": 40 } },
                    { id: "d_08", name: "咖啡", tempOptions: ["半糖","無糖"], prices: { "小400cc": 20, "中500cc": 30, "大700cc": 40 } },
                    { id: "d_09", name: "鮮奶咖啡", tempOptions: ["半糖","無糖"], prices: { "小400cc": 30, "中500cc": 40, "大700cc": 50 } },
                    { id: "d_10", name: "豆乳咖啡", tempOptions: ["半糖","無糖"], prices: { "小400cc": 30, "中500cc": 40, "大700cc": 50 } },
                    { id: "d_11", name: "鮮蜜豆奶", tempOptions: ["半糖","無糖"], prices: { "小400cc": 30, "中500cc": 40, "大700cc": 50 } },
                    { id: "d_12", name: "奶油濃湯", price: 35 },
                    { id: "d_13", name: "蔬菜湯", price: 35 }
                ]
            }
        ];

        // ⚠️【請將這裡換成你從 Google 部署得到的 Web App 網址】⚠️
        const API_URL = "https://script.google.com/macros/s/AKfycbyY4CsSl45gr8h30UKNU_3W6g7SBDxw8HqH_J2tuDKlO_DauNegE_VWiWOvAuyfqc6H/exec";

        let cart = [];

        function initMenu() {
            const container = document.getElementById('accordion-container');
            container.innerHTML = '';

            menuData.forEach((catGroup) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'accordion-item';
                
                const header = document.createElement('div');
                header.className = 'accordion-header';
                header.innerText = catGroup.category;
                header.onclick = function() { itemDiv.classList.toggle('active'); };
                
                const content = document.createElement('div');
                content.className = 'accordion-content';
                
                const grid = document.createElement('div');
                grid.className = 'menu-grid';
                
                catGroup.items.forEach(item => {
                    grid.appendChild(createMenuItemElement(item));
                });
                
                content.appendChild(grid);
                itemDiv.appendChild(header);
                itemDiv.appendChild(content);
                container.appendChild(itemDiv);
            });
        }

        function createMenuItemElement(item) {
            const wrapper = document.createElement('div');
            wrapper.className = 'menu-item';
            
            const mainInfo = document.createElement('div');
            const nameDiv = document.createElement('div');
            nameDiv.className = 'item-name';
            nameDiv.innerText = item.name;
            mainInfo.appendChild(nameDiv);
            
            if (item.types && item.prices) {
                const lbl1 = document.createElement('div'); lbl1.className = 'opt-label'; lbl1.innerText = '選擇種類：'; mainInfo.appendChild(lbl1);
                const grp1 = document.createElement('div'); grp1.className = 'option-group'; grp1.id = `type-${item.id}`;
                item.types.forEach((t, i) => {
                    const btn = document.createElement('button'); btn.className = `opt-btn ${i===0?'selected':''}`; btn.innerText = t;
                    btn.onclick = function() { selectSingleBtn(btn); updateMainPrice(item); };
                    grp1.appendChild(btn);
                });
                mainInfo.appendChild(grp1);
                
                const lbl2 = document.createElement('div'); lbl2.className = 'opt-label'; lbl2.innerText = '加蛋選單：'; mainInfo.appendChild(lbl2);
                const grp2 = document.createElement('div'); grp2.className = 'option-group'; grp2.id = `egg-${item.id}`;
                if (item.hasEggOpt) {
                    const b1 = document.createElement('button'); b1.className = 'opt-btn selected'; b1.innerText = '加蛋'; b1.onclick = function() { selectSingleBtn(b1); updateMainPrice(item); };
                    const b2 = document.createElement('button'); b2.className = 'opt-btn'; b2.innerText = '無蛋'; b2.onclick = function() { selectSingleBtn(b2); updateMainPrice(item); };
                    grp2.appendChild(b1); grp2.appendChild(b2);
                } else {
                    const b0 = document.createElement('button'); b0.className = 'opt-btn selected'; b0.style.cursor = 'default'; b0.innerText = item.prices[`${item.types[0]}_加蛋`]? '加蛋':'無蛋';
                    grp2.appendChild(b0);
                }
                mainInfo.appendChild(grp2);
            } 
            else if (item.prices && !item.tempOptions) {
                const lbl = document.createElement('div'); lbl.className = 'opt-label'; lbl.innerText = '選擇規格：'; mainInfo.appendChild(lbl);
                const grp = document.createElement('div'); grp.className = 'option-group'; grp.id = `spec-${item.id}`;
                Object.keys(item.prices).forEach((spec, idx) => {
                    const btn = document.createElement('button'); btn.className = `opt-btn ${idx===0?'selected':''}`; btn.innerText = spec;
                    btn.onclick = function() { selectSingleBtn(btn); updateSpecPrice(item, item.prices[spec]); };
                    grp.appendChild(btn);
                });
                mainInfo.appendChild(grp);
            }
            else if (item.prices && item.tempOptions) {
                const lbl1 = document.createElement('div'); lbl1.className = 'opt-label'; lbl1.innerText = '容量：'; mainInfo.appendChild(lbl1);
                const grp1 = document.createElement('div'); grp1.className = 'option-group'; grp1.id = `size-${item.id}`;
                Object.keys(item.prices).forEach((size, idx) => {
                    const btn = document.createElement('button'); btn.className = `opt-btn ${idx===0?'selected':''}`; btn.innerText = size;
                    btn.onclick = function() { selectSingleBtn(btn); updateDrinkPrice(item); };
                    grp1.appendChild(btn);
                });
                mainInfo.appendChild(grp1);
                
                const lbl2 = document.createElement('div'); lbl2.className = 'opt-label'; lbl2.innerText = '冰熱糖度：'; mainInfo.appendChild(lbl2);
                const grp2 = document.createElement('div'); grp2.className = 'option-group'; grp2.id = `temp-${item.id}`;
                item.tempOptions.forEach((t, idx) => {
                    const btn = document.createElement('button'); btn.className = `opt-btn ${idx===0?'selected':''}`; btn.innerText = t;
                    btn.onclick = function() { selectSingleBtn(btn); };
                    grp2.appendChild(btn);
                });
                mainInfo.appendChild(grp2);
            }
            else if (item.typeOptions) {
                const lbl = document.createElement('div'); lbl.className = 'opt-label'; lbl.innerText = '客製：'; mainInfo.appendChild(lbl);
                const grp = document.createElement('div'); grp.className = 'option-group'; grp.id = `custom-${item.id}`;
                item.typeOptions.forEach((o, i) => {
                    const btn = document.createElement('button'); btn.className = `opt-btn ${i===0?'selected':''}`; btn.innerText = o;
                    btn.onclick = function() { selectSingleBtn(btn); };
                    grp.appendChild(btn);
                });
                mainInfo.appendChild(grp);
            }
            
            wrapper.appendChild(mainInfo);
            
            const footer = document.createElement('div');
            footer.className = 'item-footer';
            
            const priceSpan = document.createElement('span');
            priceSpan.className = 'item-price';
            priceSpan.id = `price-${item.id}`;
            let initPrice = item.price || 0;
            if (item.prices) {
                let firstKey = item.types ? (item.hasEggOpt ? `${item.types[0]}_加蛋` : `${item.types[0]}_無蛋`) : Object.keys(item.prices)[0];
                initPrice = item.prices[firstKey] || Object.values(item.prices)[0];
            }
            priceSpan.innerText = `$${initPrice}`;
            footer.appendChild(priceSpan);
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-btn';
            addBtn.innerText = '加入購物車';
            addBtn.onclick = function() { addToCart(item); };
            footer.appendChild(addBtn);
            
            wrapper.appendChild(footer);
            return wrapper;
        }

        function selectSingleBtn(btn) {
            const p = btn.parentElement;
            p.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function updateMainPrice(item) {
            const typeSelected = document.getElementById(`type-${item.id}`).querySelector('.opt-btn.selected').innerText;
            const eggSelected = document.getElementById(`egg-${item.id}`).querySelector('.opt-btn.selected').innerText;
            let key = `${typeSelected}_${eggSelected}`;
            let price = item.prices[key] || 0;
            document.getElementById(`price-${item.id}`).innerText = `$${price}`;
        }
        
        function updateSpecPrice(item, price) {
            document.getElementById(`price-${item.id}`).innerText = `$${price}`;
        }

        function updateDrinkPrice(item) {
            const sizeSelected = document.getElementById(`size-${item.id}`).querySelector('.opt-btn.selected').innerText;
            let price = item.prices[sizeSelected];
            document.getElementById(`price-${item.id}`).innerText = `$${price}`;
        }

        function addToCart(item) {
            let fullName = item.name;
            let finalPrice = item.price || 0;

            if (item.types && item.prices) {
                const typeS = document.getElementById(`type-${item.id}`).querySelector('.opt-btn.selected').innerText;
                const eggS = document.getElementById(`egg-${item.id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${typeS}-${item.name}(${eggS})`;
                finalPrice = item.prices[`${typeS}_${eggS}`];
            } else if (item.prices && !item.tempOptions) {
                const specS = document.getElementById(`spec-${item.id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${item.name}(${specS})`;
                finalPrice = item.prices[specS];
            } else if (item.prices && item.tempOptions) {
                const sizeS = document.getElementById(`size-${item.id}`).querySelector('.opt-btn.selected').innerText;
                const tempS = document.getElementById(`temp-${item.id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${item.name}-${sizeS}(${tempS})`;
                finalPrice = item.prices[sizeS];
            } else if (item.typeOptions) {
                const custS = document.getElementById(`custom-${item.id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${item.name}(${custS})`;
            }

            const existing = cart.find(c => c.fullName === fullName);
            if (existing) { existing.qty++; } else { cart.push({ fullName: fullName, price: finalPrice, qty: 1 }); }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const totalSpan = document.getElementById('cart-total-price');
            if(cart.length === 0) {
                list.innerHTML = `<p style="color: #a0aec0; text-align: center; padding: 20px 0;">購物車目前空空如也</p>`;
                totalSpan.innerText = '0';
                return;
            }
            let cartHtml = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += (item.price * item.qty);
                cartHtml += `<div class="cart-item">
                    <span style="font-weight:500;">${item.fullName} <b style="color:var(--primary-color);">x ${item.qty}</b></span>
                    <span>$${item.price * item.qty} <button style="color:#e53e3e; border:none; background:none; cursor:pointer; margin-left:8px;" onclick="removeFromCart(${index})">❌</button></span>
                </div>`;
            });
            list.innerHTML = cartHtml;
            totalSpan.innerText = total;
        }

        function removeFromCart(index) { cart.splice(index, 1); renderCart(); }

        // ✨ 這是修正過、完美融合你的精美表格欄位的雲端送單機制
        function submitOrder() {
            if(cart.length === 0) { alert('您的購物車是空的！'); return; }
            const phone = document.getElementById('user-phone').value.trim();
            if(!phone) { alert('為了聯絡取餐，請務必填寫聯絡電話！'); return; }
            
            if(API_URL === "你的Google網址") {
                alert("⚠️ 請先將 index.html 程式碼中的 API_URL 換成你的 Google Apps Script 網址喔！");
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = '訂單傳送中...';

            const oDate = document.getElementById('order-date').value;
            const dtype = document.getElementById('dining-type').value;
            const tnum = document.getElementById('table-num').value || '未填寫';
            const note = document.getElementById('order-note').value || '無';
            const total = parseInt(document.getElementById('cart-total-price').innerText);
            
            // 完美打包你左邊畫面的所有欄位
            const payload = {
                date: oDate,
                type: dtype,
                tableNum: tnum,
                phone: phone,
                line: document.getElementById('user-line').value.trim() || '未填寫',
                items: cart,
                note: note,
                total: total
            };

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert(`🎉 點餐成功！訂單已順利送往試算表與店家後台囉！`);
                cart = [];
                document.getElementById('order-note').value = '';
                renderCart();
            })
            .catch(err => {
                alert('連線失敗，請檢查網路或 API 網址設定！');
                console.error(err);
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = '確認送出訂單';
            });
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function scrollToCart() { document.getElementById('target-cart-section').scrollIntoView({ behavior: 'smooth', block: 'start' }); }

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('order-date').value = today;
            initMenu();
        };
    </script>
