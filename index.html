<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍愛家素食早午餐 - 線上點餐</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-32">

    <header class="bg-green-600 text-white p-4 sticky top-0 z-10 shadow-md">
        <h1 class="text-xl font-bold text-center"><i class="fa-solid fa-leaf mr-2"></i>珍愛家素食早午餐</h1>
        <p class="text-center text-xs opacity-90 mt-1">電話: 0908313913 | 每星期一公休</p>
    </header>

    <div class="max-w-md mx-auto p-4">
        <div class="flex gap-4 mb-6">
            <button id="btn-takeout" onclick="setOrderType('外帶')" class="flex-1 py-3 bg-green-100 text-green-700 font-bold rounded-xl border-2 border-green-500 transition shadow-sm">
                <i class="fa-solid fa-bag-shopping mr-2"></i>外帶
            </button>
            <button id="btn-dinein" onclick="setOrderType('內用')" class="flex-1 py-3 bg-white text-gray-700 font-bold rounded-xl border-2 border-gray-200 transition shadow-sm">
                <i class="fa-solid fa-utensils mr-2"></i>內用
            </button>
        </div>

        <div id="menu-container" class="space-y-4"></div>
    </div>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-lg hidden">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <span class="text-gray-500 text-sm">已點 <span id="cart-count" class="font-bold text-green-600">0</span> 項商品</span>
                <div class="text-xl font-black text-green-600">NT$ <span id="cart-total">0</span></div>
            </div>
            <button onclick="openModal()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-green-700 transition">
                查看購物車 <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-end justify-center hidden">
        <div class="bg-white w-full max-w-md rounded-t-2xl p-6 max-h-screen overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-cart-shopping text-green-600 mr-2"></i>確認訂單</h3>
                <button onclick="closeModal()" class="text-gray-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div id="modal-items" class="space-y-4 mb-4"></div>

            <div class="mb-6">
                <label for="order-note" class="block text-sm font-medium text-gray-700 mb-1">訂單備註 / 桌號（選填）</label>
                <input type="text" id="order-note" placeholder="例如：內用3號桌、去冰、不加蛋..." class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-green-500">
            </div>

            <button id="submit-btn" onclick="submitOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-md hover:bg-green-700 transition flex justify-center items-center gap-2">
                <span>送出訂單</span>
            </button>
        </div>
    </div>

    <script>
        // ⚠️ 請在這裡換成你從 Google 部署得到的網址 ⚠️
        const API_URL = "https://script.google.com/macros/s/AKfycbw8XI_vAjjJd2NEEyQS74zhD2M_nzEu3L7CWrIJwdaauPRS5Qvg9zBC5Q-b6vlNAgpi/exec";

        // 珍愛家素食真實菜單資料
        const menuData = {
            "全麥吐司/漢堡 (加蛋)": [
                { id: 101, name: "煎蛋 (加蛋)", price: 30 },
                { id: 102, name: "鮮蔬 (加蛋)", price: 40 },
                { id: 103, name: "羅勒起士蛋 (加蛋)", price: 40 },
                { id: 104, name: "起士鮮蔬 (加蛋)", price: 45 },
                { id: 105, name: "玉米 (加蛋)", price: 45 },
                { id: 106, name: "素肉鬆 (加蛋)", price: 45 },
                { id: 107, name: "火腿 (加蛋)", price: 45 },
                { id: 108, name: "培根 (加蛋)", price: 45 },
                { id: 109, name: "薯餅 (加蛋)", price: 50 },
                { id: 110, name: "鮪魚沙拉 (加蛋)", price: 55 },
                { id: 111, name: "香雞排 (加蛋)", price: 55 },
                { id: 112, name: "黑胡椒豬排 (加蛋)", price: 65 },
                { id: 113, name: "香辣卡拉雞 (加蛋)", price: 65 },
                { id: 114, name: "超級總匯 (加蛋)", price: 75 }
            ],
            "蛋餅 / 抓餅": [
                { id: 201, name: "原味蛋餅", price: 25 }, { id: 202, name: "原味抓餅", price: 45 },
                { id: 203, name: "九層塔蛋餅", price: 35 }, { id: 204, name: "九層塔抓餅", price: 55 },
                { id: 205, name: "起士蛋餅", price: 35 }, { id: 206, name: "起士抓餅", price: 55 },
                { id: 207, name: "素肉鬆蛋餅", price: 35 }, { id: 208, name: "素肉鬆抓餅", price: 55 },
                { id: 209, name: "火腿蛋餅", price: 35 }, { id: 210, name: "火腿抓餅", price: 55 },
                { id: 211, name: "培根蛋餅", price: 35 }, { id: 212, name: "培根抓餅", price: 55 },
                { id: 213, name: "玉米蛋餅", price: 40 }, { id: 214, name: "玉米抓餅", price: 60 },
                { id: 215, name: "鮮蔬蛋餅", price: 40 }, { id: 216, name: "鮮蔬抓餅", price: 60 },
                { id: 217, name: "薯餅蛋餅", price: 40 }, { id: 218, name: "薯餅抓餅", price: 60 },
                { id: 219, name: "鮪魚沙拉蛋餅", price: 45 }, { id: 220, name: "鮪魚沙拉抓餅", price: 65 },
                { id: 221, name: "豬排蛋餅", price: 45 }, { id: 222, name: "豬排抓餅", price: 65 },
                { id: 223, name: "卡拉雞蛋餅", price: 50 }, { id: 224, name: "卡拉雞抓餅", price: 70 },
                { id: 225, name: "超級總匯蛋餅", price: 60 }, { id: 226, name: "超級總匯抓餅", price: 80 }
            ],
            "果醬吐司 (薄/厚)": [
                { id: 301, name: "花生吐司 (薄)", price: 20 }, { id: 302, name: "花生吐司 (厚)", price: 25 },
                { id: 303, name: "巧克力吐司 (薄)", price: 20 }, { id: 304, name: "巧克力吐司 (厚)", price: 25 },
                { id: 305, name: "草莓吐司 (薄)", price: 20 }, { id: 306, name: "草莓吐司 (厚)", price: 25 },
                { id: 307, name: "椰香吐司 (薄)", price: 20 }, { id: 308, name: "椰香吐司 (厚)", price: 25 },
                { id: 309, name: "抹茶吐司 (薄)", price: 20 }, { id: 310, name: "抹茶吐司 (厚)", price: 25 }
            ],
            "美味單點": [
                { id: 401, name: "薯餅", price: 20 },
                { id: 402, name: "薯條", price: 30 },
                { id: 403, name: "粗脆薯", price: 40 },
                { id: 404, name: "熱狗", price: 30 },
                { id: 405, name: "鹹酥雞(奶素)", price: 40 },
                { id: 406, name: "麥克雞塊", price: 25 },
                { id: 407, name: "荷包蛋", price: 15 },
                { id: 408, name: "蘿蔔糕", price: 30 },
                { id: 409, name: "蘿蔔糕炒蛋", price: 45 },
                { id: 410, name: "綜合蔬菜炒蛋", price: 35 }
            ],
            "飲品 (中500cc/大700cc)": [
                { id: 501, name: "紅茶 (中)", price: 20 }, { id: 502, name: "紅茶 (大)", price: 30 },
                { id: 503, name: "奶茶 (中)", price: 20 }, { id: 504, name: "奶茶 (大)", price: 30 },
                { id: 505, name: "鮮奶茶 (中)", price: 30 }, { id: 506, name: "鮮奶茶 (大)", price: 40 },
                { id: 507, name: "豆漿 (中)", price: 20 }, { id: 508, name: "豆漿 (大)", price: 30 },
                { id: 509, name: "豆漿紅茶 (中)", price: 25 }, { id: 510, name: "豆漿紅茶 (大)", price: 35 },
                { id: 511, name: "拿鐵咖啡 (中)", price: 40 }, { id: 512, name: "拿鐵咖啡 (大)", price: 50 },
                { id: 513, name: "蔬菜湯", price: 35 }
            ]
        };

        let cart = {};
        let orderType = "外帶";
        let categoryStatus = { "全麥吐司/漢堡 (加蛋)": true, "蛋餅 / 抓餅": true, "果醬吐司 (薄/厚)": true, "美味單點": true, "飲品 (中500cc/大700cc)": true };

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            for (const category in menuData) {
                const isOpen = categoryStatus[category];
                let categoryHtml = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div onclick="toggleCategory('${category}')" class="flex justify-between items-center p-4 bg-gray-50 font-bold text-gray-700 cursor-pointer select-none">
                            <span>${category}</span>
                            <i class="fa-solid ${isOpen ? 'fa-chevron-up' : 'fa-chevron-down'} text-gray-400"></i>
                        </div>
                        <div class="${isOpen ? '' : 'hidden'} divide-y divide-gray-100">
                `;

                menuData[category].forEach(item => {
                    const qty = cart[item.id] ? cart[item.id].qty : 0;
                    categoryHtml += `
                        <div class="p-4 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-gray-800">${item.name}</h4>
                                <p class="text-green-600 font-medium mt-1">NT$ ${item.price}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                ${qty > 0 ? `
                                    <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 rounded-full border border-green-500 text-green-500 flex items-center justify-center font-bold">-</button>
                                    <span class="font-bold text-gray-700 w-4 text-center">${qty}</span>
                                ` : ''}
                                <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 rounded-full bg-green-600 text-white flex items-center justify-center font-bold">+</button>
                            </div>
                        </div>
                    `;
                });

                categoryHtml += `</div></div>`;
                container.innerHTML += categoryHtml;
            }
        }

        function toggleCategory(category) {
            categoryStatus[category] = !categoryStatus[category];
            renderMenu();
        }

        function setOrderType(type) {
            orderType = type;
            document.getElementById('btn-takeout').className = type === '外帶' ? 'flex-1 py-3 bg-green-100 text-green-700 font-bold rounded-xl border-2 border-green-500 transition shadow-sm' : 'flex-1 py-3 bg-white text-gray-700 font-bold rounded-xl border-2 border-gray-200 transition shadow-sm';
            document.getElementById('btn-dinein').className = type === '內用' ? 'flex-1 py-3 bg-green-100 text-green-700 font-bold rounded-xl border-2 border-green-500 transition shadow-sm' : 'flex-1 py-3 bg-white text-gray-700 font-bold rounded-xl border-2 border-gray-200 transition shadow-sm';
        }

        function updateQty(id, change) {
            let foundItem = null;
            for (const cat in menuData) {
                const match = menuData[cat].find(i => i.id === id);
                if (match) { foundItem = match; break; }
            }

            if (!cart[id]) {
                cart[id] = { name: foundItem.name, price: foundItem.price, qty: 0 };
            }

            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];

            renderMenu();
            updateCartBar();
        }

        function updateCartBar() {
            let total = 0, count = 0;
            for (const id in cart) {
                total += cart[id].price * cart[id].qty;
                count += cart[id].qty;
            }

            const cartBar = document.getElementById('cart-bar');
            if (count > 0) {
                cartBar.classList.remove('hidden');
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-total').innerText = total;
            } else {
                cartBar.classList.add('hidden');
            }
        }

        function openModal() {
            document.getElementById('cart-modal').classList.remove('hidden');
            const container = document.getElementById('modal-items');
            container.innerHTML = '';

            for (const id in cart) {
                const item = cart[id];
                container.innerHTML += `
                    <div class="flex justify-between items-center text-sm border-b pb-2">
                        <div>
                            <div class="font-bold text-gray-800">${item.name}</div>
                            <div class="text-gray-400 mt-0.5">NT$ ${item.price} × ${item.qty}</div>
                        </div>
                        <div class="font-bold text-gray-800">NT$ ${item.price * item.qty}</div>
                    </div>
                `;
            }
        }

        function closeModal() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        function submitOrder() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-2"></i>傳送中...`;

            let itemsArray = [];
            let total = 0;
            for (const id in cart) {
                itemsArray.push({ name: cart[id].name, qty: cart[id].qty });
                total += cart[id].price * cart[id].qty;
            }

            const orderData = {
                action: "add",
                id: "ORD-" + Date.now().toString().slice(-6),
                time: new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }),
                type: orderType,
                items: itemsArray,
                total: total,
                note: document.getElementById('order-note').value
            };

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(orderData)
            })
            .then(() => {
                alert("🎉 訂單已傳送到雲端！請至櫃台確認。");
                cart = {};
                document.getElementById('order-note').value = '';
                closeModal();
                updateCartBar();
                renderMenu();
            })
            .catch(err => {
                alert("連線失敗，請再試一次。");
                console.error(err);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<span>送出訂單</span>`;
            });
        }

        renderMenu();
    </script>
</body>
</html>
