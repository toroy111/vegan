<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐點線上點餐系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .category-tab.active {
            background-color: #f97316;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <!-- 頂部店名 -->
    <header class="bg-orange-500 text-white p-4 sticky top-0 z-10 shadow-md">
        <h1 class="text-xl font-bold text-center"><i class="fa-solid fa-store mr-2"></i>美味早午餐</h1>
    </header>

    <div class="max-w-md mx-auto p-4">
        <!-- 取餐方式 -->
        <div class="flex gap-4 mb-6">
            <button id="btn-takeout" onclick="setOrderType('外帶')" class="flex-1 py-3 bg-orange-100 text-orange-700 font-bold rounded-xl border-2 border-orange-500 transition shadow-sm">
                <i class="fa-solid fa-bag-shopping mr-2"></i>外帶
            </button>
            <button id="btn-dinein" onclick="setOrderType('內用')" class="flex-1 py-3 bg-white text-gray-700 font-bold rounded-xl border-2 border-gray-200 transition shadow-sm">
                <i class="fa-solid fa-utensils mr-2"></i>內用
            </button>
        </div>

        <!-- 分類摺疊與菜單 -->
        <div id="menu-container" class="space-y-4">
            <!-- 菜單由 JavaScript 動態渲染 -->
        </div>
    </div>

    <!-- 底部購物車預覽條 -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-lg hidden">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <span class="text-gray-500 text-sm">已點 <span id="cart-count" class="font-bold text-orange-500">0</span> 項商品</span>
                <div class="text-xl font-black text-orange-600">NT$ <span id="cart-total">0</span></div>
            </div>
            <button onclick="openModal()" class="bg-orange-500 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-orange-600 transition">
                查看購物車 <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
        </div>
    </div>

    <!-- 購物車彈窗 (Modal) -->
    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden">
        <div class="bg-white w-full max-w-md rounded-t-2xl p-6 max-h-[85vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-cart-shopping text-orange-500 mr-2"></i>確認訂單</h3>
                <button onclick="closeModal()" class="text-gray-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <!-- 購物車清單 -->
            <div id="modal-items" class="space-y-4 mb-4">
                <!-- 項目 -->
            </div>

            <!-- 備註 -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">訂單備註（選填）</label>
                <input type="text" id="order-note" placeholder="例如：去冰、不加洋蔥、桌號..." class="w-full border rounded-lg p-2 text-sm focus:outline-none focus:border-orange-500">
            </div>

            <!-- 結帳按紐 -->
            <button id="submit-btn" onclick="submitOrder()" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold text-lg shadow-md hover:bg-orange-600 transition flex justify-center items-center gap-2">
                <span>送出訂單</span>
            </button>
        </div>
    </div>

    <script>
        // ⚠️ 請換成你從 Google 部署得到的網址 ⚠️
        const API_URL = "https://script.google.com/macros/s/AKfycbw8XI_vAjjJd2NEEyQS74zhD2M_nzEu3L7CWrIJwdaauPRS5Qvg9zBC5Q-b6vlNAgpi/exec";

        // 菜單資料
        const menuData = {
            "蛋餅系列": [
                { id: 1, name: "原味蛋餅", price: 30 },
                { id: 2, name: "起司蛋餅", price: 40 },
                { id: 3, name: "培根蛋餅", price: 45 }
            ],
            "漢堡系列": [
                { id: 4, name: "卡啦雞腿堡", price: 65 },
                { id: 5, name: "牛肉起司堡", price: 70 }
            ],
            "飲品": [
                { id: 6, name: "紅茶 (L)", price: 20 },
                { id: 7, name: "奶茶 (L)", price: 25 },
                { id: 8, name: "拿鐵咖啡", price: 50 }
            ]
        };

        let cart = {};
        let orderType = "外帶";
        // 紀錄各分類是否展開，預設全部展開
        let categoryStatus = { "蛋餅系列": true, "漢堡系列": true, "飲品": true };

        // 渲染菜單
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            for (const category in menuData) {
                const isOpen = categoryStatus[category];
                let categoryHtml = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <!-- 分類標題 -->
                        <div onclick="toggleCategory('${category}')" class="flex justify-between items-center p-4 bg-gray-50 font-bold text-gray-700 cursor-pointer select-none">
                            <span>${category}</span>
                            <i class="fa-solid ${isOpen ? 'fa-chevron-up' : 'fa-chevron-down'} text-gray-400 transition-transform"></i>
                        </div>
                        <!-- 分類餐點 -->
                        <div class="${isOpen ? '' : 'hidden'} divide-y divide-gray-100">
                `;

                menuData[category].forEach(item => {
                    const qty = cart[item.id] ? cart[item.id].qty : 0;
                    categoryHtml += `
                        <div class="p-4 flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-gray-800">${item.name}</h4>
                                <p class="text-orange-500 font-medium mt-1">NT$ ${item.price}</p>
                            </div>
                            <!-- 加減按紐 -->
                            <div class="flex items-center gap-3">
                                ${qty > 0 ? `
                                    <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 rounded-full border border-orange-500 text-orange-500 flex items-center justify-center hover:bg-orange-50 font-bold">-</button>
                                    <span class="font-bold text-gray-700 w-4 text-center">${qty}</span>
                                ` : ''}
                                <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center hover:bg-orange-600 font-bold">+</button>
                            </div>
                        </div>
                    `;
                });

                categoryHtml += `</div></div>`;
                container.innerHTML += categoryHtml;
            }
        }

        function toggleCategory(category) {
            categoryStatus[category] = !categoryStatus[category];
            renderMenu();
        }

        function setOrderType(type) {
            orderType = type;
            document.getElementById('btn-takeout').className = type === '外帶' ? 'flex-1 py-3 bg-orange-100 text-orange-700 font-bold rounded-xl border-2 border-orange-500 transition shadow-sm' : 'flex-1 py-3 bg-white text-gray-700 font-bold rounded-xl border-2 border-gray-200 transition shadow-sm';
            document.getElementById('btn-dinein').className = type === '內用' ? 'flex-1 py-3 bg-orange-100 text-orange-700 font-bold rounded-xl border-2 border-orange-500 transition shadow-sm' : 'flex-1 py-3 bg-white text-gray-700 font-bold rounded-xl border-2 border-gray-200 transition shadow-sm';
        }

        function updateQty(id, change) {
            // 尋找商品資料
            let foundItem = null;
            for (const cat in menuData) {
                const match = menuData[cat].find(i => i.id === id);
                if (match) { foundItem = match; break; }
            }

            if (!cart[id]) {
                cart[id] = { name: foundItem.name, price: foundItem.price, qty: 0 };
            }

            cart[id].qty += change;

            if (cart[id].qty <= 0) {
                delete cart[id];
            }

            renderMenu();
            updateCartBar();
        }

        function updateCartBar() {
            let total = 0;
            let count = 0;
            for (const id in cart) {
                total += cart[id].price * cart[id].qty;
                count += cart[id].qty;
            }

            const cartBar = document.getElementById('cart-bar');
            if (count > 0) {
                cartBar.classList.remove('hidden');
                document.getElementById('cart-count').innerText = count;
                document.getElementById('cart-total').innerText = total;
            } else {
                cartBar.classList.add('hidden');
            }
        }

        function openModal() {
            document.getElementById('cart-modal').classList.remove('hidden');
            const container = document.getElementById('modal-items');
            container.innerHTML = '';

            for (const id in cart) {
                const item = cart[id];
                container.innerHTML += `
                    <div class="flex justify-between items-center text-sm border-b pb-2">
                        <div>
                            <div class="font-bold text-gray-800">${item.name}</div>
                            <div class="text-gray-400 mt-0.5">NT$ ${item.price} × ${item.qty}</div>
                        </div>
                        <div class="font-bold text-gray-800">NT$ ${item.price * item.qty}</div>
                    </div>
                `;
            }
        }

        function closeModal() {
            document.getElementById('cart-modal').classList.add('hidden');
        }

        // 傳送訂單到雲端 Google Sheets
        function submitOrder() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-2"></i>傳送中...`;

            let itemsArray = [];
            let total = 0;
            for (const id in cart) {
                itemsArray.push({ name: cart[id].name, qty: cart[id].qty });
                total += cart[id].price * cart[id].qty;
            }

            const orderData = {
                action: "add",
                id: "ORD-" + Date.now().toString().slice(-6),
                time: new Date().toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }),
                type: orderType,
                items: itemsArray,
                total: total,
                note: document.getElementById('order-note').value
            };

            // 使用 fetch 丟到 Google Apps Script
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors", // 跨網域傳輸
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(orderData)
            })
            .then(() => {
                alert("🎉 訂單已成功送出！請至櫃台結帳。");
                cart = {};
                document.getElementById('order-note').value = '';
                closeModal();
                updateCartBar();
                renderMenu();
            })
            .catch(err => {
                alert("連線失敗，請檢查網路或重新嘗試。");
                console.error(err);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<span>送出訂單</span>`;
            });
        }

        // 初始化
        renderMenu();
    </script>
</body>
</html>
