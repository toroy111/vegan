                    { id: "d_05", name: "柳丁汁", tempOptions: ["冰","涼"], prices: { "小杯400cc": 20, "中杯500cc": 25, "大杯700cc": 35 } },
                    { id: "d_06", name: "豆漿紅茶", tempOptions: ["半糖冰","半糖涼","半糖溫","半糖熱","無糖冰","無糖涼","無糖溫","無糖熱"], prices: { "小杯400cc": 20, "中杯500cc": 25, "大杯700cc": 35 } },
                    { id: "d_07", name: "鴛鴦奶茶", tempOptions: ["冰","涼","溫","熱"], prices: { "小杯400cc": 20, "中杯500cc": 30, "大杯700cc": 40 } },
                    { id: "d_08", name: "咖啡", tempOptions: ["半糖冰","半糖涼","半糖溫","半糖熱","無糖冰","無糖涼","無糖溫","無糖熱"], prices: { "小杯400cc": 20, "中杯500cc": 30, "大杯700cc": 40 } },
                    { id: "d_09", name: "鮮奶咖啡", tempOptions: ["半糖冰","半糖涼","半糖溫","半糖熱","無糖冰","無糖涼","無糖溫","無糖熱"], prices: { "小杯400cc": 30, "中杯500cc": 40, "大杯700cc": 50 } },
                    { id: "d_10", name: "豆乳咖啡", tempOptions: ["半糖冰","半糖涼","半糖溫","半糖熱","無糖冰","無糖涼","無糖溫","無糖熱"], prices: { "小杯400cc": 30, "中杯500cc": 40, "大杯700cc": 50 } },
                    { id: "d_11", name: "鮮蜜豆奶", tempOptions: ["半糖冰","半糖涼","半糖溫","半糖熱","無糖冰","無糖涼","無糖溫","無糖熱"], prices: { "小杯400cc": 30, "中杯500cc": 40, "大杯700cc": 50 } },
                    { id: "d_12", name: "奶油濃湯", price: 35 },
                    { id: "d_13", name: "蔬菜湯", price: 35 }
                ]
            }
        ];

        let cart = [];

        function initMenu() {
            const container = document.getElementById('accordion-container');
            container.innerHTML = '';

            menuData.forEach((catGroup, catIdx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `accordion-item ${catIdx === 0 ? 'active' : ''}`; // 預設展開第一個
                
                const header = document.createElement('div');
                header.className = 'accordion-header';
                header.innerText = catGroup.category;
                header.onclick = () => { itemDiv.classList.toggle('active'); };
                
                const content = document.createElement('div');
                content.className = 'accordion-content';
                
                const grid = document.createElement('div');
                grid.className = 'menu-grid';
                
                catGroup.items.forEach(item => {
                    grid.innerHTML += renderMenuItemHtml(item);
                });
                
                content.appendChild(grid);
                itemDiv.appendChild(header);
                itemDiv.appendChild(content);
                container.appendChild(itemDiv);
            });
        }

        function renderMenuItemHtml(item) {
            let html = `<div class="menu-item"><div><div class="item-name">${item.name}</div>`;
            
            // 情況一：主食系列 (需要選擇 種類 與 是否加蛋)
            if (item.types && item.prices) {
                html += `<div class="opt-label">選擇主食種類：</div><div class="option-group" id="type-${item.id}">`;
                item.types.forEach((t, i) => {
                    html += `<button class="opt-btn ${i===0?'selected':''}" onclick="updateMainPrice('${item.id}')">${t}</button>`;
                });
                html += `</div>`;
                
                if (item.hasEggOpt) {
                    html += `<div class="opt-label">加蛋/無蛋選單：</div><div class="option-group" id="egg-${item.id}">
                        <button class="opt-btn selected" onclick="updateMainPrice('${item.id}')">加蛋</button>
                        <button class="opt-btn" onclick="updateMainPrice('${item.id}')">無蛋</button>
                    </div>`;
                } else {
                    html += `<div class="opt-label">固定配方：</div><div class="option-group" id="egg-${item.id}">
                        <button class="opt-btn selected" style="cursor:default">無蛋</button>
                    </div>`;
                }
                let firstKey = item.hasEggOpt ? `${item.types[0]}_加蛋` : `${item.types[0]}_無蛋`;
                let initPrice = item.prices[firstKey] || 30;
                html += `</div><div class="item-footer"><span class="item-price" id="price-${item.id}">$${initPrice}</span>`;
            }
            // 情況二：蛋餅 / 抓餅 與 果醬吐司 與 麵食
            else if (item.prices && !item.tempOptions) {
                html += `<div class="opt-label">選擇規格：</div><div class="option-group" id="spec-${item.id}">`;
                Object.keys(item.prices).forEach((spec, idx) => {
                    html += `<button class="opt-btn ${idx===0?'selected':''}" onclick="updateSpecPrice('${item.id}', ${item.prices[spec]})">${spec}</button>`;
                });
                html += `</div>`;
                let initPrice = Object.values(item.prices)[0];
                html += `</div><div class="item-footer"><span class="item-price" id="price-${item.id}">$${initPrice}</span>`;
            }
            // 情況三：冷熱飲料有大小杯與溫度
            else if (item.prices && item.tempOptions) {
                html += `<div class="opt-label">選擇容量大小：</div><div class="option-group" id="size-${item.id}">`;
                Object.keys(item.prices).forEach((size, idx) => {
                    html += `<button class="opt-btn ${idx===0?'selected':''}" onclick="updateDrinkPrice('${item.id}')">${size}</button>`;
                });
                html += `</div>`;
                
                html += `<div class="opt-label">選擇溫度/糖度：</div><div class="option-group" id="temp-${item.id}">`;
                item.tempOptions.forEach((t, idx) => {
                    html += `<button class="opt-btn ${idx===0?'selected':''}" onclick="selectSingleBtn(this)">${t}</button>`;
                });
                html += `</div>`;
                let initPrice = Object.values(item.prices)[0];
                html += `</div><div class="item-footer"><span class="item-price" id="price-${item.id}">$${initPrice}</span>`;
            }
            // 情況四：一般小吃單點
            else {
                if(item.typeOptions) {
                    html += `<div class="opt-label">客製選項：</div><div class="option-group" id="custom-${item.id}">`;
                    item.typeOptions.forEach((o, i) => {
                        html += `<button class="opt-btn ${i===0?'selected':''}" onclick="selectSingleBtn(this)">${o}</button>`;
                    });
                    html += `</div>`;
                }
                html += `</div><div class="item-footer"><span class="item-price">$${item.price}</span>`;
            }
            
            html += `<button class="add-btn" onclick="addToCart('${item.id}', '${item.name}')">加入</button></div></div>`;
            return html;
        }

        // 單選按鈕切換輔助
        function selectSingleBtn(btn) {
            const p = btn.parentElement;
            p.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function updateMainPrice(id) {
            let item = findItemById(id);
            const typeSelected = document.getElementById(`type-${id}`).querySelector('.opt-btn.selected').innerText;
            const eggSelected = document.getElementById(`egg-${id}`).querySelector('.opt-btn.selected').innerText;
            let key = `${typeSelected}_${eggSelected}`;
            let price = item.prices[key] || 0;
            document.getElementById(`price-${id}`).innerText = `$${price}`;
        }
        
        function updateSpecPrice(id, price) {
            event.target.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById(`price-${id}`).innerText = `$${price}`;
        }

        function updateDrinkPrice(id) {
            selectSingleBtn(event.target);
            let item = findItemById(id);
            const sizeSelected = document.getElementById(`size-${id}`).querySelector('.opt-btn.selected').innerText;
            let price = item.prices[sizeSelected];
            document.getElementById(`price-${id}`).innerText = `$${price}`;
        }

        function findItemById(id) {
            for(let cat of menuData) {
                let match = cat.items.find(i => i.id === id);
                if(match) return match;
            }
            return null;
        }

        function addToCart(id, name) {
            let item = findItemById(id);
            let fullName = name;
            let finalPrice = 0;

            // 抓取各區組裝名稱與計算價格
            if (item.types && item.prices) {
                const typeS = document.getElementById(`type-${id}`).querySelector('.opt-btn.selected').innerText;
                const eggS = document.getElementById(`egg-${id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${typeS}-${name}(${eggS})`;
                finalPrice = item.prices[`${typeS}_${eggS}`];
            } else if (item.prices && !item.tempOptions) {
                const specS = document.getElementById(`spec-${id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${name}(${specS})`;
                finalPrice = item.prices[specS];
            } else if (item.prices && item.tempOptions) {
                const sizeS = document.getElementById(`size-${id}`).querySelector('.opt-btn.selected').innerText;
                const tempS = document.getElementById(`temp-${id}`).querySelector('.opt-btn.selected').innerText;
                fullName = `${name}-${sizeS}(${tempS})`;
                finalPrice = item.prices[sizeS];
            } else {
                finalPrice = item.price;
                if(item.typeOptions) {
                    const custS = document.getElementById(`custom-${id}`).querySelector('.opt-btn.selected').innerText;
                    fullName = `${name}(${custS})`;
                }
            }

            const existing = cart.find(c => c.fullName === fullName);
            if (existing) { existing.qty++; } else { cart.push({ fullName: fullName, price: finalPrice, qty: 1 }); }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const totalSpan = document.getElementById('cart-total-price');
            if(cart.length === 0) {
                list.innerHTML = `<p style="color: #a0aec0; text-align: center; padding: 20px 0;">購物車目前空空如也</p>`;
                totalSpan.innerText = '0';
                return;
            }
            let cartHtml = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += (item.price * item.qty);
                cartHtml += `<div class="cart-item">
                    <span style="font-weight:500;">${item.fullName} <b>x ${item.qty}</b></span>
                    <span>$${item.price * item.qty} <button style="color:#e53e3e; border:none; background:none; cursor:pointer; margin-left:8px; font-size:14px;" onclick="removeFromCart(${index})">❌</button></span>
                </div>`;
            });
            list.innerHTML = cartHtml;
            totalSpan.innerText = total;
        }

        function removeFromCart(index) { cart.splice(index, 1); renderCart(); }

        function submitOrder() {
            if(cart.length === 0) { alert('您的購物車是空的！'); return; }
            const phone = document.getElementById('user-phone').value.trim();
            if(!phone) { alert('為了點餐狀態通知，請務必填寫聯絡電話！'); return; }

            const oDate = document.getElementById('order-date').value;
            const dtype = document.getElementById('dining-type').value;
            const tnum = document.getElementById('table-num').value || '未填寫';
            const note = document.getElementById('order-note').value || '無';
            const total = parseInt(document.getElementById('cart-total-price').innerText);
            
            let localOrders = JSON.parse(localStorage.getItem('jlh_orders')) || [];
            let currentId = parseInt(localStorage.getItem('jlh_order_id_counter')) || 1001;

            const newOrder = {
                id: currentId,
                date: oDate,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                type: `${dtype} (${tnum})`,
                phone: phone,
                line: document.getElementById('user-line').value.trim() || '未填寫',
                items: [...cart],
                note: note,
                total: total,
                status: '新訂單'
            };

            localOrders.push(newOrder);
            localStorage.setItem('jlh_orders', JSON.stringify(localOrders));
            localStorage.setItem('jlh_order_id_counter', currentId + 1);
            
            alert(`🎉 訂單 #${currentId} 已成功送出！`);
            cart = [];
            document.getElementById('user-phone').value = '';
            document.getElementById('user-line').value = '';
            document.getElementById('order-note').value = '';
            renderCart();
        }

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('order-date').value = today;
            initMenu();
            
            // 監聽按鈕點擊更新主食價格
            window.updateMainPrice = updateMainPrice;
        };
    </script>
