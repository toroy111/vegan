<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍愛家素食早午餐 - 線上點餐</title>
    <style>
        :root { --primary-color: #e67e22; --secondary-color: #27ae60; --bg-color: #f9f9f9; --dark-color: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-color); color: var(--dark-color); padding-bottom: 50px; }
        header { background-color: var(--primary-color); color: white; padding: 15px; text-align: center; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .shop-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .shop-layout { grid-template-columns: 1fr; } }
        
        .menu-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-title { color: var(--secondary-color); border-left: 4px solid var(--secondary-color); padding-left: 10px; margin: 20px 0 10px 0; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .menu-grid { grid-template-columns: 1fr; } }
        
        .menu-item { border: 1px solid #eee; padding: 15px; border-radius: 6px; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        
        .option-group { margin: 8px 0; display: flex; flex-wrap: wrap; gap: 5px; }
        .opt-btn { background: #f0f0f0; border: 1px solid #ddd; padding: 4px 8px; font-size: 12px; border-radius: 4px; cursor: pointer; }
        .opt-btn.selected { background: var(--secondary-color); color: white; border-color: var(--secondary-color); }
        
        .item-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .item-price { color: #c0392b; font-weight: bold; }
        .add-btn { background: var(--primary-color); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        
        .cart-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .cart-total { font-size: 18px; font-weight: bold; text-align: right; margin: 20px 0; color: #c0392b; }
        .submit-order-btn { width: 100%; background: var(--secondary-color); color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        
        /* 表單輸入框優化 */
        .input-field { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .flex-inputs { display: flex; gap: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>珍愛家素食早午餐</h1>
        <p>電話：0908-313913 | 歡迎線上點餐</p>
    </header>

    <div class="container">
        <div class="shop-layout">
            <div class="menu-section">
                <h2>美味菜單</h2>
                <div id="menu-renderer"></div>
            </div>
            
            <div class="cart-section">
                <h3>🛒 我的購物車</h3>
                <div style="margin: 15px 0 10px 0;">
                    <label style="font-size: 14px; font-weight: bold;">📅 取餐日期：</label>
                    <input type="date" id="order-date" class="input-field">
                    
                    <div class="flex-inputs">
                        <select id="dining-type" class="input-field" style="width: 40%;">
                            <option value="內用">內用</option>
                            <option value="外帶">外帶</option>
                        </select>
                        <input type="text" id="table-num" placeholder="桌號 / 姓名" class="input-field" style="width: 60%;">
                    </div>
                    
                    <label style="font-size: 14px; font-weight: bold;">✍️ 訂單備註（客製化要求）：</label>
                    <textarea id="order-note" class="input-field" placeholder="例如：拿鐵去冰 / 蛋餅要酥一點 / 不要加醬" style="height: 60px; resize: none;"></textarea>
                </div>
                <hr>
                <div id="cart-items-list" style="margin-top: 15px;">
                    <p style="color: #999; text-align: center;">購物車目前空空如也</p>
                </div>
                <div class="cart-total">總金額: $<span id="cart-total-price">0</span></div>
                <button class="submit-order-btn" onclick="submitOrder()">確認送出訂單</button>
            </div>
        </div>
    </div>

    <script>
        // 菜單資料庫
        const menuData = {
            "蛋餅類": [
                { id: "e1", name: "原味蛋餅", price: 25 },
                { id: "e2", name: "日式蛋餅", price: 35 },
                { id: "e3", name: "九層塔蛋餅", price: 35 },
                { id: "e4", name: "起士蛋餅", price: 35 },
                { id: "e5", name: "素肉鬆蛋餅", price: 35 },
                { id: "e6", name: "蔬菜蛋餅", price: 35 },
                { id: "e7", name: "火腿蛋餅", price: 35 }
            ],
            "漢堡 / 吐司系列": [
                { id: "h1", name: "煎蛋", options: { "無蛋": 30, "加蛋": 40 } },
                { id: "h2", name: "鮮蔬", options: { "無蛋": 40, "加蛋": 50 } },
                { id: "h3", name: "羅勒起士蛋", options: { "加蛋": 40 } },
                { id: "h4", name: "起士鮮蔬", options: { "無蛋": 45, "加蛋": 55 } },
                { id: "h5", name: "香菇野菇(全素)", options: { "無蛋": 50, "加蛋": 60 } },
                { id: "h6", name: "雞排", options: { "無蛋": 55, "加蛋": 65 } },
                { id: "h7", name: "黑胡椒豬排", options: { "無蛋": 65, "加蛋": 75 } },
                { id: "h8", name: "超級總匯", options: { "無蛋": 75, "加蛋": 85 } }
            ],
            "美味麵食": [
                { id: "m1", name: "黑胡椒麵", price: 40, setPrice: 80 },
                { id: "m2", name: "奶油白醬麵", price: 40, setPrice: 80 },
                { id: "m3", name: "香菇肉燥麵", price: 45, setPrice: 85 },
                { id: "m4", name: "鐵板拌麵", price: 45, setPrice: 85 }
            ],
            "飲品 (500cc/700cc)": [
                { id: "d1", name: "紅茶 (冰/溫/熱)", price: 15 },
                { id: "d2", name: "奶茶 (冰/溫/熱)", price: 15 },
                { id: "d3", name: "鮮奶茶 (冰/溫/熱)", price: 25 },
                { id: "d4", name: "豆漿 (半糖/無糖)", price: 15 },
                { id: "d5", name: "豆漿紅茶", price: 20 },
                { id: "d6", name: "鴛鴦奶茶", price: 20 },
                { id: "d7", name: "豆乳咖啡", price: 30 }
            ]
        };

        let cart = [];

        function renderMenu() {
            const renderer = document.getElementById('menu-renderer');
            renderer.innerHTML = '';
            for (let category in menuData) {
                let catHtml = `<h3 class="category-title">${category}</h3><div class="menu-grid">`;
                menuData[category].forEach(item => {
                    catHtml += `<div class="menu-item"><div><div class="item-name">${item.name}</div>`;
                    if (item.options) {
                        catHtml += `<div class="option-group" id="opts-${item.id}">`;
                        Object.keys(item.options).forEach((opt, idx) => {
                            catHtml += `<button class="opt-btn ${idx===0?'selected':''}" onclick="selectOpt('${item.id}', '${opt}', ${item.options[opt]})">${opt} (+$${item.options[opt]})</button>`;
                        });
                        catHtml += `</div>`;
                    }
                    if (item.setPrice) {
                        catHtml += `<div class="option-group" id="opts-${item.id}">
                            <button class="opt-btn selected" onclick="selectOpt('${item.id}', '單點', ${item.price})">單點 ($${item.price})</button>
                            <button class="opt-btn" onclick="selectOpt('${item.id}', '升級套餐', ${item.setPrice})">套餐 ($${item.setPrice})</button>
                        </div>`;
                    }
                    let initialPrice = item.price || (item.options ? Object.values(item.options)[0] : 0);
                    catHtml += `</div><div class="item-footer"><span class="item-price" id="price-${item.id}">$${initialPrice}</span>
                            <button class="add-btn" onclick="addToCart('${item.id}', '${item.name}')">加入購物車</button></div></div>`;
                });
                catHtml += `</div>`;
                renderer.innerHTML += catHtml;
            }
        }

        function selectOpt(itemId, optName, price) {
            const btnGroup = document.getElementById(`opts-${itemId}`);
            btnGroup.querySelectorAll('.opt-btn').forEach(b => {
                if(b.innerText.includes(optName)) b.classList.add('selected');
                else b.classList.remove('selected');
            });
            document.getElementById(`price-${itemId}`).innerText = `$${price}`;
        }

        function addToCart(itemId, itemName) {
            const btnGroup = document.getElementById(`opts-${itemId}`);
            let finalName = itemName;
            let finalPrice = 0;
            if (btnGroup) {
                const selected = btnGroup.querySelector('.opt-btn.selected');
                let optText = selected.innerText.split(' ')[0];
                finalName += ` [${optText}]`;
                finalPrice = parseInt(document.getElementById(`price-${itemId}`).innerText.replace('$', ''));
            } else {
                for(let cat in menuData){
                    let match = menuData[cat].find(i => i.id === itemId);
                    if(match) finalPrice = match.price;
                }
            }
            const existing = cart.find(c => c.fullName === finalName);
            if (existing) { existing.qty++; } else { cart.push({ fullName: finalName, price: finalPrice, qty: 1 }); }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            const totalSpan = document.getElementById('cart-total-price');
            if(cart.length === 0) {
                list.innerHTML = `<p style="color: #999; text-align: center;">購物車目前空空如也</p>`;
                totalSpan.innerText = '0';
                return;
            }
            let cartHtml = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += (item.price * item.qty);
                cartHtml += `<div class="cart-item"><span>${item.fullName} x ${item.qty}</span>
                    <span>$${item.price * item.qty} <button style="color:red; border:none; background:none; cursor:pointer; margin-left:5px;" onclick="removeFromCart(${index})">❌</button></span></div>`;
            });
            list.innerHTML = cartHtml;
            totalSpan.innerText = total;
        }

        function removeFromCart(index) { cart.splice(index, 1); renderCart(); }

        // 送出訂單
        function submitOrder() {
            if(cart.length === 0) { alert('您的購物車是空的！'); return; }
            const oDate = document.getElementById('order-date').value;
            const dtype = document.getElementById('dining-type').value;
            const tnum = document.getElementById('table-num').value || '未填寫';
            const note = document.getElementById('order-note').value || '無';
            const total = parseInt(document.getElementById('cart-total-price').innerText);
            
            let localOrders = JSON.parse(localStorage.getItem('jlh_orders')) || [];
            let currentId = parseInt(localStorage.getItem('jlh_order_id_counter')) || 1001;

            const newOrder = {
                id: currentId,
                date: oDate,  // 新增：取餐日期
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                type: `${dtype} - ${tnum}`,
                items: [...cart],
                note: note,   // 新增：客製化備註
                total: total,
                status: '新訂單'
            };

            localOrders.push(newOrder);
            localStorage.setItem('jlh_orders', JSON.stringify(localOrders));
            localStorage.setItem('jlh_order_id_counter', currentId + 1);
            
            alert(`訂單 #${currentId} 已成功送出！`);
            cart = [];
            document.getElementById('order-note').value = ''; // 清空備註欄
            renderCart();
        }

        // 初始化日期選擇器為今天
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('order-date').value = today;
            renderMenu();
        };
    </script>
</body>
</html>
