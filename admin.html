<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店家廚房接單後台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- 頂部列 -->
    <header class="bg-slate-800 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black tracking-wider"><i class="fa-solid fa-clipboard-list text-orange-400 mr-2"></i>KITCHEN CONTROL CENTRE</h1>
        <div class="flex items-center gap-4">
            <span class="text-xs bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-1 rounded animate-pulse">雲端即時連線中</span>
            <button onclick="fetchOrders()" class="text-sm bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg transition"><i class="fa-solid fa-rotate mr-1"></i>重整</button>
        </div>
    </header>

    <!-- 三欄式大面板 -->
    <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto">
        
        <!-- 1. 新進訂單 -->
        <div class="bg-slate-200/60 p-4 rounded-2xl border border-slate-300/40">
            <div class="flex justify-between items-center mb-4 border-b border-slate-300 pb-2">
                <h3 class="font-extrabold text-slate-700 text-lg flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-orange-500 animate-ping"></span>新進訂單
                </h3>
                <span id="count-new" class="bg-orange-500 text-white px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>
            </div>
            <div id="list-new" class="space-y-4 max-h-[75vh] overflow-y-auto pr-1"></div>
        </div>

        <!-- 2. 製作中 -->
        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
            <div class="flex justify-between items-center mb-4 border-b border-blue-200 pb-2">
                <h3 class="font-extrabold text-blue-700 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-fire-burner text-blue-500"></i>製作中
                </h3>
                <span id="count-progress" class="bg-blue-500 text-white px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>
            </div>
            <div id="list-progress" class="space-y-4 max-h-[75vh] overflow-y-auto pr-1"></div>
        </div>

        <!-- 3. 已完成 (僅顯示當日前幾筆) -->
        <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
            <div class="flex justify-between items-center mb-4 border-b border-emerald-200 pb-2">
                <h3 class="font-extrabold text-emerald-700 text-lg flex items-center gap-2">
                    <i class="fa-solid fa-circle-check text-emerald-500"></i>今日已完成
                </h3>
                <span id="count-done" class="bg-emerald-500 text-white px-2.5 py-0.5 rounded-full text-xs font-bold">0</span>
            </div>
            <div id="list-done" class="space-y-4 max-h-[75vh] overflow-y-auto pr-1"></div>
        </div>

    </div>

    <!-- 提示音效 -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/951/951-200.wav" preload="auto"></audio>

    <script>
        // ⚠️ 請換成你從 Google 部署得到的網址 ⚠️
        const API_URL = "你的Google網址";
        
        let previousOrderCount = -1;

        // 從 Google Sheets 抓取最新訂單資料
        function fetchOrders() {
            fetch(API_URL)
                .then(res => res.json())
                .then(orders => {
                    renderDashboard(orders);
                })
                .catch(err => console.error("抓取雲端資料失敗:", err));
        }

        // 渲染大面板
        function renderDashboard(orders) {
            const listNew = document.getElementById('list-new');
            const listProgress = document.getElementById('list-progress');
            const listDone = document.getElementById('list-done');

            listNew.innerHTML = '';
            listProgress.innerHTML = '';
            listDone.innerHTML = '';

            let cNew = 0, cProgress = 0, cDone = 0;

            orders.forEach(order => {
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `<div class="flex justify-between text-sm py-0.5 text-slate-700 font-medium"><span>${item.name}</span><span>× ${item.qty}</span></div>`;
                });

                const cardHtml = `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition">
                        <div class="flex justify-between items-start border-b pb-2 mb-2">
                            <div>
                                <span class="text-xs bg-slate-100 px-2 py-0.5 rounded text-slate-600 font-mono">${order.id}</span>
                                <div class="text-lg font-black text-slate-800 mt-1">${order.time} <span class="text-sm font-bold ml-1 ${order.type==='內用'?'text-blue-500':'text-orange-500'}">[${order.type}]</span></div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-gray-400">總金額</div>
                                <div class="text-md font-bold text-slate-800">NT$ ${order.total}</div>
                            </div>
                        </div>
                        <div class="divide-y divide-gray-100 my-3 bg-gray-50/50 p-2 rounded-lg border border-gray-100">
                            ${itemsHtml}
                        </div>
                        ${order.note ? `<div class="text-xs bg-amber-50 text-amber-700 p-2 rounded-md mb-3 border border-amber-200/50"><i class="fa-solid fa-comment-dots mr-1"></i>${order.note}</div>` : ''}
                        
                        <!-- 按鈕切換狀態 -->
                        <div class="flex gap-2 mt-2">
                            ${order.status === '未製作' ? `
                                <button onclick="changeStatus('${order.id}', '製作中')" class="w-full bg-blue-500 hover:bg-blue-600 text-white text-sm font-bold py-2 rounded-lg transition">開始製作</button>
                            ` : ''}
                            ${order.status === '製作中' ? `
                                <button onclick="changeStatus('${order.id}', '已完成')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-bold py-2 rounded-lg transition">完成出餐</button>
                            ` : ''}
                            ${order.status === '已完成' ? `
                                <span class="text-xs text-emerald-600 font-bold bg-emerald-50 border border-emerald-200 px-3 py-1 rounded-md w-full text-center"><i class="fa-solid fa-check mr-1"></i>已在雲端封存</span>
                            ` : ''}
                        </div>
                    </div>
                `;

                if (order.status === '未製作') {
                    listNew.innerHTML += cardHtml;
                    cNew++;
                } else if (order.status === '製作中') {
                    listProgress.innerHTML += cardHtml;
                    cProgress++;
                } else if (order.status === '已完成') {
                    listDone.innerHTML = cardHtml + listDone.innerHTML; // 最新完成的排前面
                    cDone++;
                }
            });

            // 數字更新
            document.getElementById('count-new').innerText = cNew;
            document.getElementById('count-progress').innerText = cProgress;
            document.getElementById('count-done').innerText = cDone;

            // 音效提示機制 (只在新訂單總數增加時發出叮咚聲)
            if (previousOrderCount !== -1 && orders.length > previousOrderCount) {
                document.getElementById('alert-sound').play().catch(e => console.log("等待手動觸發音效"));
            }
            previousOrderCount = orders.length;
        }

        // 修改雲端訂單狀態
        function changeStatus(id, newStatus) {
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "update", id: id, status: newStatus })
            })
            .then(() => {
                // 為了避免雲端延遲，本地直接先手動刷新
                fetchOrders();
            });
        }

        // 初始化與定時輪詢
        fetchOrders();
        setInterval(fetchOrders, 5000); // 💡 每 5 秒鐘自動同步一次雲端
    </script>
</body>
</html>
